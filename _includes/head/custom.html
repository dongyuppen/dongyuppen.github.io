<!-- 1. 줄바꿈이 무시되지 않도록 강제하는 CSS -->
<style>
  .site-title a {
    display: block !important;
    white-space: normal !important;
    line-height: 1.3 !important;
  }
</style>

<!-- 2. 버전 상관없이 타이틀을 무조건 찾아내서 바꾸는 JS -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    // 글자를 찾는 범위를 더 넓고 확실하게 변경했습니다.
    var titleElement =
      document.querySelector(".site-title a") ||
      document.querySelector(".site-title");

    if (titleElement) {
      titleElement.innerHTML = "백엔드 개발자<br>김동엽 포트폴리오";
    }
  });
</script>
