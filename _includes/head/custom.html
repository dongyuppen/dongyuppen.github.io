<script>
  // 브라우저 상단 탭(document.title)에 들어간 HTML 태그만 찾아내서 싹 지우는 코드
  document.addEventListener("DOMContentLoaded", function () {
    // 1. <br> 태그는 띄어쓰기 한 칸으로 바꿔서 단어 사이를 띄워줍니다.
    var cleanTitle = document.title.replace(/<br\s*\/?>/gi, " ");

    // 2. <span> 등 나머지 HTML 태그 찌꺼기는 흔적도 없이 지워버립니다.
    cleanTitle = cleanTitle.replace(/<[^>]+>/g, "");

    // 3. 깨끗해진 글자를 브라우저 탭 이름으로 다시 세팅합니다.
    document.title = cleanTitle;
  });
</script>
