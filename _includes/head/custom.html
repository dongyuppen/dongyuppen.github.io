<!-- 1. 한 줄 강제 고정 해제 및 두 줄 허용 CSS -->
<style>
  #sidebar .site-title,
  #sidebar .site-title a {
    white-space: normal !important;
    word-break: keep-all !important;
    line-height: 1.3 !important;
  }
</style>

<!-- 2. 사이드바 글자만 콕 집어서 예쁘게 디자인하는 JS -->
<script>
  document.addEventListener("DOMContentLoaded", function() {
    var sidebarTitle = document.querySelector('#sidebar .site-title a');
    if (sidebarTitle) {
      // 브라우저 탭은 건드리지 않고, 사이드바에만 줄바꿈과 자간을 적용합니다.
      sidebarTitle.innerHTML = "백엔드 개발자<br><span style='letter-spacing: -1px;'>김동엽 포트폴리오</span>";
    }
  });
</script>
